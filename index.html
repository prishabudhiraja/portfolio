<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Prisha Portfolio</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }

    /* Typing cursor */
    #typing::after {
      content: "|";
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body class="bg-black text-white">

<!-- NAVBAR -->
<nav class="flex justify-between items-center px-6 md:px-16 py-4 fixed w-full top-0 bg-black z-50">

  <div class="text-xl font-bold text-cyan-400">PB</div>

  <ul id="navLinks" class="hidden md:flex gap-8 text-sm">
    <li><a href="#about" class="hover:text-cyan-400">About</a></li>
    <li><a href="#projects" class="hover:text-cyan-400">Projects</a></li>
    <li><a href="#contact" class="hover:text-cyan-400">Contact</a></li>
  </ul>

  <!-- Hamburger -->
  <div class="md:hidden text-xl cursor-pointer" onclick="toggleMenu()">
    <i class="fa-solid fa-bars"></i>
  </div>
</nav>

<!-- MOBILE MENU -->
<div id="mobileMenu" class="hidden flex-col bg-black text-center py-6 space-y-4 md:hidden">
  <a href="#about">About</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
</div>

<!-- HERO -->
<section class="h-screen flex flex-col justify-center px-6 md:px-16">

  <h1 class="text-4xl md:text-6xl font-bold">
    Hi, I'm <span class="text-cyan-400">Prisha</span>
  </h1>

  <h2 class="text-gray-400 mt-4 text-xl md:text-2xl">
    <span id="typing"></span>
  </h2>

  <!-- Social Icons -->
  <div class="flex gap-6 mt-6 text-xl">
    <i class="fa-brands fa-github hover:text-cyan-400 cursor-pointer"></i>
    <i class="fa-brands fa-linkedin hover:text-cyan-400 cursor-pointer"></i>
    <i class="fa-solid fa-envelope hover:text-cyan-400 cursor-pointer"></i>
  </div>

</section>

<!-- ABOUT -->
<section id="about" class="px-6 md:px-16 py-20 opacity-0 translate-y-10 transition duration-700">
  <h2 class="text-3xl font-semibold mb-4">About Me</h2>
  <p class="text-gray-400 max-w-xl">
    I'm a passionate developer who loves creating modern, interactive and user-friendly web experiences.
  </p>
</section>

<!-- PROJECTS -->
<section id="projects" class="px-6 md:px-16 py-20 opacity-0 translate-y-10 transition duration-700">

  <h2 class="text-3xl font-semibold mb-8">Projects</h2>

  <div class="grid md:grid-cols-3 gap-6">

    <div class="bg-gray-900 p-6 rounded-xl hover:scale-105 transition">
      Project 1
    </div>

    <div class="bg-gray-900 p-6 rounded-xl hover:scale-105 transition">
      Project 2
    </div>

    <div class="bg-gray-900 p-6 rounded-xl hover:scale-105 transition">
      Project 3
    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="px-6 md:px-16 py-20 opacity-0 translate-y-10 transition duration-700">
  <h2 class="text-3xl font-semibold mb-4">Contact</h2>
  <p class="text-gray-400">Let’s build something amazing together.</p>
</section>

<!-- SCRIPT -->
<script>

// MOBILE MENU
function toggleMenu() {
  document.getElementById("mobileMenu").classList.toggle("hidden");
}

// TYPING ANIMATION
const roles = [
  "Frontend Developer",
  "UI/UX Enthusiast",
  "Creative Coder"
];

let i = 0;
let j = 0;
let currentText = "";
let isDeleting = false;

function type() {
  currentText = roles[i];

  if (!isDeleting) {
    document.getElementById("typing").innerHTML =
      currentText.substring(0, j++);
  } else {
    document.getElementById("typing").innerHTML =
      currentText.substring(0, j--);
  }

  if (j == currentText.length) isDeleting = true;
  if (j == 0 && isDeleting) {
    isDeleting = false;
    i = (i + 1) % roles.length;
  }

  setTimeout(type, isDeleting ? 50 : 100);
}

type();

// SCROLL ANIMATION
const sections = document.querySelectorAll("section");

window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 50) {
      sec.classList.remove("opacity-0", "translate-y-10");
    }
  });
});

</script>

</body>
</html>
